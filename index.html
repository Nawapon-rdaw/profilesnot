<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
font-family:sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
padding:10px;
width:100%;
margin-top:10px;
}

.hidden{
display:none;
}

.msg{
color:red;
font-size:14px;
}
</style>

</head>
<body>

<div class="card">

<!-- STEP 1 -->
<div id="step1">

<h2>เข้าสู่ระบบ</h2>

<input id="email" placeholder="อีเมล">

<input id="dob" placeholder="วันเกิด 07/05/52">

<button id="startBtn">รับ OTP</button>

<p id="msg1" class="msg"></p>

</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">

<h2>กรอก OTP</h2>

<input id="otp" placeholder="OTP">

<button id="verifyBtn">ยืนยัน</button>

<button id="resendBtn">ส่งรหัสอีกครั้ง</button>

<p>ส่งใหม่ได้ใน <span id="countdown">30</span> วิ</p>

<p id="msg2" class="msg"></p>

</div>

</div>

<script>

emailjs.init("3D3PvFxV5IIPUuvoT")

let generatedOTP=""
let cooldown=30
let timer
let userEmail=""

const step1=document.getElementById("step1")
const step2=document.getElementById("step2")

const startBtn=document.getElementById("startBtn")
const verifyBtn=document.getElementById("verifyBtn")
const resendBtn=document.getElementById("resendBtn")

const msg1=document.getElementById("msg1")
const msg2=document.getElementById("msg2")

// SEND OTP

startBtn.onclick=()=>{

const email=document.getElementById("email").value.trim()
const dob=document.getElementById("dob").value.trim()

msg1.innerText=""

if(!email || !email.includes("@")){
msg1.innerText="กรุณากรอกอีเมลให้ถูกต้อง"
return
}

if(dob!=="07/05/52"){
msg1.innerText="วันเกิดไม่ถูกต้อง"
return
}

generatedOTP=Math.floor(100000+Math.random()*900000)

userEmail=email

msg1.innerText="กำลังส่ง OTP..."

emailjs.send(
"service_u1sg0qg",
"mm3s3izr",
{
to_email:userEmail,
otp:generatedOTP,
time:"15 minutes"
},
"NDaVGjZMceU5d7xL3"
)

.then(()=>{

msg1.innerText="ส่ง OTP ไปที่อีเมลแล้ว"

step1.classList.add("hidden")
step2.classList.remove("hidden")

startCooldown()

})

.catch((error)=>{

console.log(error)

msg1.innerText="ส่ง OTP ไม่สำเร็จ"

})

}

// VERIFY OTP

verifyBtn.onclick=()=>{

const otp=document.getElementById("otp").value.trim()

msg2.innerText=""

if(otp!==generatedOTP.toString()){
msg2.innerText="OTP ไม่ถูกต้อง"
return
}

document.querySelector(".card").innerHTML=`
<h2>ยืนยันตัวตนสำเร็จ</h2>
<p>กำลังเข้าสู่เว็บ...</p>
`

setTimeout(()=>{
window.location.href="home.html"
},1500)

}

// RESEND OTP

resendBtn.onclick=()=>{

generatedOTP=Math.floor(100000+Math.random()*900000)

emailjs.send(
"service_u1sg0qg",
"mm3s3izr",
{
to_email:userEmail,
otp:generatedOTP,
time:"15 minutes"
},
"NDaVGjZMceU5d7xL3"
)

msg2.innerText="ส่ง OTP ใหม่แล้ว"

startCooldown()

}

// COOLDOWN

function startCooldown(){

const countdown=document.getElementById("countdown")

resendBtn.disabled=true

cooldown=30

countdown.innerText=cooldown

clearInterval(timer)

timer=setInterval(()=>{

cooldown--

countdown.innerText=cooldown

if(cooldown<=0){

clearInterval(timer)

resendBtn.disabled=false

resendBtn.innerText="ส่งรหัสอีกครั้ง"

}

},1000)

}

</script>

</body>
</html>
