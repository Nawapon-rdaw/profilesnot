<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
font-family:'Segoe UI',sans-serif;
}

.card{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.3);
padding:30px;
border-radius:20px;
box-shadow:0 8px 32px rgba(31,38,135,0.37);
width:350px;
color:white;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
border:1px solid rgba(255,255,255,0.2);
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#fff;
color:#764ba2;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.resend{
margin-top:10px;
background:transparent;
color:white;
border:1px solid rgba(255,255,255,0.5);
}

.hidden{display:none;}

.msg{
font-size:0.85rem;
margin-top:8px;
min-height:18px;
}
</style>
</head>

<body>

<div class="card">

<div id="step1">
<h3>ยินดีต้อนรับ</h3>

<input type="email" id="email" placeholder="กรอกอีเมล">
<input type="text" id="dob" placeholder="วันเกิด (07/05/52)">

<button id="startBtn">ดำเนินการต่อ</button>

<div class="msg" id="msg1"></div>
</div>

<div id="step2" class="hidden">

<h3>ยืนยัน OTP</h3>

<input id="otp" placeholder="รหัส OTP">

<button id="verifyBtn">ยืนยัน</button>

<button id="resendBtn" class="resend" disabled>
ส่งรหัสอีกครั้ง (<span id="countdown">30</span>)
</button>

<div class="msg" id="msg2"></div>

</div>

</div>

<script>

emailjs.init("NhRzcUBJfJN3LH4gn")

let generatedOTP=""
let userEmail=""
let cooldown=30
let timer

const step1=document.getElementById("step1")
const step2=document.getElementById("step2")

const startBtn=document.getElementById("startBtn")
const verifyBtn=document.getElementById("verifyBtn")
const resendBtn=document.getElementById("resendBtn")

const msg1=document.getElementById("msg1")
const msg2=document.getElementById("msg2")

// SEND OTP

startBtn.onclick=()=>{

const email=document.getElementById("email").value.trim()
const dob=document.getElementById("dob").value.trim()

msg1.innerText=""

if(!email || !email.includes("@")){
msg1.innerText="กรุณากรอกอีเมลให้ถูกต้อง"
return
}

if(dob!=="07/05/52"){
msg1.innerText="วันเกิดไม่ถูกต้อง"
return
}

generatedOTP=Math.floor(100000+Math.random()*900000)

userEmail=email

msg1.innerText="กำลังส่ง OTP..."

emailjs.send(
"service_u1sg0qg",
"template_1o51epg",
{
to_email:userEmail,
otp:generatedOTP
}
)

.then(()=>{

msg1.innerText="ส่ง OTP ไปที่อีเมลแล้ว"

step1.classList.add("hidden")
step2.classList.remove("hidden")

startCooldown()

})

.catch(()=>{
msg1.innerText="ส่ง OTP ไม่สำเร็จ"
})

}

// VERIFY

verifyBtn.onclick=()=>{

const otp=document.getElementById("otp").value.trim()

if(otp!==generatedOTP.toString()){
msg2.innerText="OTP ไม่ถูกต้อง"
return
}

document.querySelector(".card").innerHTML=`
<h2>ยืนยันสำเร็จ</h2>
<p>กำลังเข้าสู่ระบบ...</p>
`

setTimeout(()=>{
window.location.href="home.html"
},1500)

}

// RESEND

resendBtn.onclick=()=>{

generatedOTP=Math.floor(100000+Math.random()*900000)

emailjs.send(
"service_xxxxx",
"template_xxxxx",
{
to_email:userEmail,
otp:generatedOTP
}
)

msg2.innerText="ส่ง OTP ใหม่แล้ว"

startCooldown()

}

// TIMER

function startCooldown(){

const countdown=document.getElementById("countdown")

resendBtn.disabled=true

cooldown=30

countdown.innerText=cooldown

clearInterval(timer)

timer=setInterval(()=>{

cooldown--

countdown.innerText=cooldown

if(cooldown<=0){

clearInterval(timer)

resendBtn.disabled=false

resendBtn.innerText="ส่งรหัสอีกครั้ง"

}

},1000)

}

</script>

</body>
</html>
