<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* ===== BACKGROUND ===== */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(120deg,#7aa8ff,#b6a6ff,#9fd6ff,#c7b3ff);
background-size:400% 400%;
animation:bgMove 35s ease infinite;

color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ===== CARD ===== */

.card{

width:360px;
padding:40px;

border-radius:22px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.25);

box-shadow:0 20px 50px rgba(0,0,0,0.25);

text-align:center;

animation:fadeIn 1.2s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

h3{
margin-bottom:18px;
font-weight:600;
letter-spacing:.5px;
}

/* ===== INPUT ===== */

input{

width:100%;
padding:13px;

margin:10px 0;

border-radius:12px;

border:1px solid rgba(255,255,255,0.25);

background:rgba(255,255,255,0.15);

color:white;

font-size:14px;

transition:0.3s;

}

input::placeholder{
color:rgba(255,255,255,0.7);
}

input:focus{

outline:none;

background:rgba(255,255,255,0.25);

border-color:#6ec3ff;

box-shadow:0 0 12px rgba(110,195,255,0.6);

}

/* ===== BUTTON ===== */

button{

width:100%;
padding:13px;

margin-top:14px;

border:none;
border-radius:12px;

font-weight:600;
cursor:pointer;

transition:0.35s;

}

/* main */

#startBtn,
#verifyBtn{

background:linear-gradient(90deg,#5ecbff,#7b8cff);

color:white;

}

#startBtn:hover,
#verifyBtn:hover{

transform:translateY(-2px);

box-shadow:0 6px 18px rgba(0,150,255,0.4);

}

/* resend */

.resend{

background:transparent;

border:1px solid rgba(255,255,255,0.35);

color:white;

}

.resend:hover{
background:rgba(255,255,255,0.2);
}

/* ===== MESSAGE ===== */

.msg{

font-size:13px;

margin-top:10px;

min-height:18px;

opacity:0.9;

}

.hidden{
display:none;
}

/* success */

.success{
animation:pop 0.7s ease;
}

@keyframes pop{
0%{transform:scale(.85);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

</style>

</head>

<body>

<div class="card">

<!-- STEP 1 -->

<div id="step1">

<h3>𝔴𝔢𝔩𝔠𝔬𝔪𝔢</h3>

<input type="email" id="email" placeholder="กรอกอีเมล">

<input type="text" id="dob" placeholder="วันเกิด (07/05/52)">

<button id="startBtn">ดำเนินการต่อ</button>

<div class="msg" id="msg1"></div>

</div>

<!-- STEP 2 -->

<div id="step2" class="hidden">

<h3>ยืนยัน OTP</h3>

<input id="otp" placeholder="กรอกรหัส OTP">

<button id="verifyBtn">ยืนยัน</button>

<button id="resendBtn" class="resend" disabled>
ส่งรหัสอีกครั้ง (<span id="countdown">30</span>)
</button>

<div class="msg" id="msg2"></div>

</div>

</div>

<script>

emailjs.init("NhRzcUBJfJN3LH4gn")

let generatedOTP=""
let userEmail=""
let cooldown=30
let timer

const step1=document.getElementById("step1")
const step2=document.getElementById("step2")

const startBtn=document.getElementById("startBtn")
const verifyBtn=document.getElementById("verifyBtn")
const resendBtn=document.getElementById("resendBtn")

const msg1=document.getElementById("msg1")
const msg2=document.getElementById("msg2")

/* ===== SEND OTP ===== */

startBtn.onclick=()=>{

const email=document.getElementById("email").value.trim()
const dob=document.getElementById("dob").value.trim()

msg1.innerText=""

if(!email || !email.includes("@")){
msg1.innerText="กรุณากรอกอีเมลให้ถูกต้อง"
return
}

if(dob!=="07/05/52"){
msg1.innerText="วันเกิดไม่ถูกต้อง"
return
}

generatedOTP=Math.floor(100000+Math.random()*900000)

userEmail=email

msg1.innerText="กำลังส่ง OTP..."

emailjs.send(
"service_u1sg0qg",
"template_1o51epg",
{
to_email:userEmail,
otp:generatedOTP
}
)

.then(()=>{

msg1.innerText="ส่ง OTP ไปที่อีเมลแล้ว"

step1.classList.add("hidden")
step2.classList.remove("hidden")

startCooldown()

})

.catch(()=>{
msg1.innerText="ส่ง OTP ไม่สำเร็จ"
})

}

/* ===== VERIFY OTP ===== */

verifyBtn.onclick=()=>{

const otp=document.getElementById("otp").value.trim()

if(otp!==generatedOTP.toString()){
msg2.innerText="OTP ไม่ถูกต้อง"
return
}

document.querySelector(".card").innerHTML=`
<div class="success">
<h2>ยืนยันสำเร็จ</h2>
<p>กำลังเข้าสู่ระบบ...</p>
</div>
`

setTimeout(()=>{
window.location.href="home.html"
},1500)

}

/* ===== RESEND ===== */

resendBtn.onclick=()=>{

generatedOTP=Math.floor(100000+Math.random()*900000)

emailjs.send(
"service_u1sg0qg",
"template_1o51epg",
{
to_email:userEmail,
otp:generatedOTP
}
)

msg2.innerText="ส่ง OTP ใหม่แล้ว"

startCooldown()

}

/* ===== TIMER ===== */

function startCooldown(){

const countdown=document.getElementById("countdown")

resendBtn.disabled=true

cooldown=30

countdown.innerText=cooldown

clearInterval(timer)

timer=setInterval(()=>{

cooldown--

countdown.innerText=cooldown

if(cooldown<=0){

clearInterval(timer)

resendBtn.disabled=false

resendBtn.innerText="ส่งรหัสอีกครั้ง"

}

},1000)

}

</script>

</body>
</html>
