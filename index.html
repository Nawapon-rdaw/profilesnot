<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.card { 
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
    width: 350px;
    color: white;
    text-align: center;
}

h3 { margin-bottom: 20px; font-weight: 300; }

input { 
    width: 100%; 
    padding: 12px; 
    margin: 10px 0; 
    border-radius: 10px; 
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    outline: none;
}

input::placeholder { color: rgba(255,255,255,0.7); }

button { 
    width: 100%; 
    padding: 12px; 
    margin-top: 15px;
    background: #fff; 
    color: #764ba2; 
    border: none; 
    border-radius: 10px; 
    cursor: pointer; 
    font-weight: bold;
    transition: 0.3s;
}

button:hover { transform: scale(1.02); }

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.resend {
    margin-top: 10px;
    background: transparent;
    color: white;
    border: 1px solid rgba(255,255,255,0.5);
}

.hidden { display: none; }
.msg { font-size: 0.85rem; margin-top: 8px; min-height:18px; }
</style>
</head>
<body>

<div class="card">
    <div id="step1">
        <h3>ยินดีต้อนรับ</h3>
        <input type="email" id="email" placeholder="กรอกอีเมลของคุณ">
        <input type="text" id="dob" placeholder="วันเกิด (07/05/52)">
        <button onclick="requestOTP()">ดำเนินการต่อ</button>
        <div class="msg" id="msg1"></div>
    </div>

    <div id="step2" class="hidden">
        <h3>ยืนยันรหัส OTP</h3>
        <input type="text" id="otp" maxlength="6" inputmode="numeric" placeholder="ระบุรหัส 6 หลัก">
        <button id="verifyBtn" onclick="verifyOTP()">ยืนยัน OTP</button>
        <button id="resendBtn" class="resend" disabled onclick="resendOTP()">
            ส่งรหัสอีกครั้ง (<span id="countdown">30</span>s)
        </button>
        <div class="msg" id="msg2"></div>
    </div>
</div>

<script>

let cooldown = 30;
let timer;

// ================= REQUEST OTP =================
async function requestOTP() {
    const email = document.getElementById('email').value.trim();
    const dob = document.getElementById('dob').value.trim();
    const msg = document.getElementById('msg1');

    msg.innerText = "";

    if (!email || !email.includes('@')) {
        msg.innerText = "กรุณากรอกอีเมลให้ถูกต้อง";
        return;
    }

    if (dob !== "07/05/52") {
        msg.innerText = "วันเกิดไม่ถูกต้อง";
        return;
    }

    try {
        const res = await fetch('/request-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
            msg.innerText = data.message;
            return;
        }

        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        startCooldown();

    } catch {
        msg.innerText = "เชื่อมต่อ Server ไม่ได้";
    }
}

// ================= VERIFY OTP =================
async function verifyOTP() {
    const email = document.getElementById('email').value.trim();
    const otp = document.getElementById('otp').value.trim();
    const msg = document.getElementById('msg2');
    const btn = document.getElementById('verifyBtn');

    msg.innerText = "";

    if (!/^\d{6}$/.test(otp)) {
        msg.innerText = "OTP ต้องเป็นตัวเลข 6 หลัก";
        return;
    }

    btn.disabled = true;
    btn.innerText = "กำลังตรวจสอบ...";

    try {
        const res = await fetch('/verify-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, otp })
        });

        const data = await res.json();

        if (!res.ok) {
            msg.innerText = data.message;
            btn.disabled = false;
            btn.innerText = "ยืนยัน OTP";
            return;
        }

       document.querySelector('.card').innerHTML = `
<h2>เว็บส่วนตัว</h2>
<p>ยืนยันตัวตนสำเร็จ</p>
<button onclick='window.location.href="home.html"'>
    ดำเนินการต่อ
</button>
`;

    } catch {
        msg.innerText = "ไม่สามารถเชื่อมต่อ Server ได้";
        btn.disabled = false;
        btn.innerText = "ยืนยัน OTP";
    }
}

// ================= RESEND =================
async function resendOTP() {
    const email = document.getElementById('email').value.trim();
    const msg = document.getElementById('msg2');

    try {
        await fetch('/request-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });

        msg.innerText = "ส่งรหัสใหม่แล้ว";
        startCooldown();

    } catch {
        msg.innerText = "ส่งไม่สำเร็จ";
    }
}

// ================= COOLDOWN =================
function startCooldown() {
    const resendBtn = document.getElementById("resendBtn");
    const countdown = document.getElementById("countdown");

    resendBtn.disabled = true;
    cooldown = 30;
    countdown.innerText = cooldown;

    clearInterval(timer);
    timer = setInterval(() => {
        cooldown--;
        countdown.innerText = cooldown;

        if (cooldown <= 0) {
            clearInterval(timer);
            resendBtn.disabled = false;
            resendBtn.innerText = "ส่งรหัสอีกครั้ง";
        }
    }, 1000);
}

</script>

</body>
</html>
